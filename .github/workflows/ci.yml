name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./internal/senml/... ./internal/handler/... ./internal/auth/...

      - name: Integration tests
        run: go test ./internal/store/... ./internal/influx/... -timeout 120s
