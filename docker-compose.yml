services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fishhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishhub}
      POSTGRES_DB: ${POSTGRES_DB:-fishhub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
