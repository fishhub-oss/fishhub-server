services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fishhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishhub}
      POSTGRES_DB: ${POSTGRES_DB:-fishhub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:3-core
    user: "0:0"
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --admin-token-file=/run/secrets/influxdb-admin-token
    volumes:
      - influxdb_data:/var/lib/influxdb3/data
    secrets:
      - influxdb-admin-token

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      INFLUXDB3_TOKEN: ${INFLUXDB3_TOKEN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

secrets:
  influxdb-admin-token:
    file: ${INFLUX_TOKEN_FILE}

volumes:
  postgres_data:
  influxdb_data:
  grafana_data:
