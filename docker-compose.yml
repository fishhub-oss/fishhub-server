services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fishhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishhub}
      POSTGRES_DB: ${POSTGRES_DB:-fishhub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:3-core
    ports:
      - "8181:8181"
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --admin-token-file=/run/secrets/influxdb-admin-token
    volumes:
      - influxdb_data:/var/lib/influxdb3/data
    secrets:
      - influxdb-admin-token

secrets:
  influxdb-admin-token:
    file: ./secrets/influxdb-admin-token.json

volumes:
  postgres_data:
  influxdb_data:
